name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Cache Wails
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails.exe
          key: ${{ runner.os }}-wails-v2

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build App
        run: wails build -ldflags "-s -w" -tags prod

      - name: Rename Artifact
        run: |
          $source = "build\\bin\\Q-Solver.exe"
          $target = "build\\bin\\q-solver-windows-amd64.exe"
          if (!(Test-Path $source)) {
            Write-Error "Executable not found: $source"
            exit 1
          }
          Move-Item $source $target -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: q-solver-windows-amd64
          path: build/bin/q-solver-windows-amd64.exe
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Cache Wails
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: ${{ runner.os }}-wails-v2

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build App
        run: wails build -ldflags "-s -w" -tags prod

      - name: Rename Artifact
        run: |
          APP_PATH="build/bin/Q-Solver.app"
          TARGET_PATH="build/bin/q-solver-macos-arm64.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found: $APP_PATH"
            exit 1
          fi
          mv "$APP_PATH" "$TARGET_PATH"

      - name: Package Artifact
        run: |
          cd build/bin
          zip -r q-solver-macos-arm64.zip q-solver-macos-arm64.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: q-solver-macos-arm64
          path: build/bin/q-solver-macos-arm64.zip
          if-no-files-found: error

  build-macos-amd64:
    name: Build macOS (Intel)
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Cache Wails
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: ${{ runner.os }}-wails-v2-amd64

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build App
        run: wails build -ldflags "-s -w" -tags prod -platform darwin/amd64

      - name: Rename Artifact
        run: |
          ROOT_APP="build/bin/Q-Solver.app"
          SUB_APP="build/bin/darwin/amd64/Q-Solver.app"
          TARGET_PATH="build/bin/q-solver-macos-amd64.app"

          if [ -d "$SUB_APP" ]; then
            mv "$SUB_APP" "$TARGET_PATH"
          elif [ -d "$ROOT_APP" ]; then
            mv "$ROOT_APP" "$TARGET_PATH"
          else
            echo "App bundle not found."
            ls -R build/bin || true
            exit 1
          fi

      - name: Package Artifact
        run: |
          cd build/bin
          zip -r q-solver-macos-amd64.zip q-solver-macos-amd64.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: q-solver-macos-amd64
          path: build/bin/q-solver-macos-amd64.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-windows, build-macos-arm64, build-macos-amd64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: q-solver-windows-amd64
          path: artifacts/windows

      - name: Download macOS arm64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: q-solver-macos-arm64
          path: artifacts/macos-arm64

      - name: Download macOS amd64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: q-solver-macos-amd64
          path: artifacts/macos-amd64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/q-solver-windows-amd64.exe
            artifacts/macos-arm64/q-solver-macos-arm64.zip
            artifacts/macos-amd64/q-solver-macos-amd64.zip
          generate_release_notes: true
